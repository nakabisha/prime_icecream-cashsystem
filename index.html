<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理一21組(2026) 素数アイス</title>
    <style>
        :root {
            --primary-color: #4caf50;
            --danger-color: #f44336;
            --setting-color: #78909c;
            --discount-color: #e91e63;
        }
        
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            background: #fffef0; padding: 20px; color: #333; touch-action: manipulation;
        }

        h1 { color: #2e7d32; font-size: 1.5rem; margin: 10px 0 20px; }

        .keypad-container { 
            width: 100%; max-width: 300px; background: #fff; padding: 15px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #e0e0e0;
        }

        #display { 
            width: 100%; box-sizing: border-box; height: 65px; text-align: right; margin-bottom: 15px; 
            padding: 10px; border: 3px solid #eee; border-radius: 12px; background: #f9f9f9;
            outline: none; color: #444; font-size: 2.2rem !important;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .keypad button { 
            aspect-ratio: 1 / 1; width: 100%; font-size: 1.6rem; font-weight: bold; cursor: pointer; 
            border: 1px solid #f0f0f0; border-radius: 15px; background: #fff; transition: all 0.1s;
            box-shadow: 0 3px 0 #ddd; user-select: none;
        }
        .keypad button:active, .keypad button.active { transform: translateY(3px); box-shadow: none; background: #f0f0f0; }
        .keypad .enter { background: var(--primary-color); color: white; border: none; box-shadow: 0 4px 0 #388e3c; }
        .keypad .back { background: var(--danger-color); color: white; border: none; box-shadow: 0 4px 0 #d32f2f; }

        .settings-btn { 
            width: 100%; max-width: 330px; margin-top: 25px; padding: 15px; font-size: 1rem; font-weight: bold;
            color: white; background: var(--setting-color); border: none; border-radius: 15px; cursor: pointer; 
            box-shadow: 0 3px 0 #546e7a;
        }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.3); 
            z-index: 10; width: 90%; max-width: 380px; 
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 5; backdrop-filter: blur(4px); }

        .cancel-btn { flex: 1; padding: 15px; background: white; color: var(--danger-color); border: 2px solid var(--danger-color); border-radius: 10px; font-weight: bold; cursor: pointer; }

        .history-section { width: 100%; max-width: 900px; margin-top: 40px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
        .history-container { overflow-x: auto; width: 100%; }
        
        table { border-collapse: collapse; width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #eee; padding: 12px 6px; text-align: center; font-size: 0.9rem; }
        th { background: #e8f5e9; color: #2e7d32; white-space: nowrap; }
        
        .total-row { background: #fff3e0; font-weight: bold; color: #e65100; }
        .time-col { color: #888; font-size: 0.75rem; white-space: nowrap; }
        .discount-text { color: var(--discount-color); font-weight: bold; }

        .del-btn { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-weight: bold; }
        .clear-all-btn { background: #ef5350; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        .setting-input { width: 80%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-size: 1rem; }
        .discount-setting-area { margin-top: 15px; padding: 10px; background: #fce4ec; border-radius: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>理一21組(2026) 素数アイス</h1>
    
    <div class="keypad-container">
        <input type="text" id="display" readonly placeholder="番号を入力">
        <div class="keypad">
            <button id="btn-1" onclick="press(1)">1</button>
            <button id="btn-2" onclick="press(2)">2</button>
            <button id="btn-3" onclick="press(3)">3</button>
            <button id="btn-4" onclick="press(4)">4</button>
            <button id="btn-5" onclick="press(5)">5</button>
            <button id="btn-6" onclick="press(6)">6</button>
            <button id="btn-7" onclick="press(7)">7</button>
            <button id="btn-8" onclick="press(8)">8</button>
            <button id="btn-9" onclick="press(9)">9</button>
            <button id="btn-BS" class="back" onclick="press('BS')">BS</button>
            <button id="btn-0" onclick="press(0)">0</button>
            <button id="btn-ENT" class="enter" onclick="submitOrder()">注文</button>
        </div>
    </div>

    <button class="settings-btn" onclick="openSettings()">⚙ メニュー・割引設定</button>

    <div id="confirmModal" class="modal">
        <h3 style="margin-top:0; color:var(--primary-color);">注文内容の確認</h3>
        <div id="orderResult"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button style="flex:1; padding:15px; background:var(--primary-color); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="confirmAction(true)">確定</button>
            <button class="cancel-btn" onclick="confirmAction(false)">取消</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <h3 style="margin-top:0">商品・価格設定</h3>
        <table id="settingsTable">
            <thead><tr><th>商品名</th><th>単価</th></tr></thead>
            <tbody id="settingsBody"></tbody>
        </table>
        <div class="discount-setting-area">
            <strong>まとめ買い割引</strong><br>
            合計 <input type="number" id="edit_disc_unit" style="width:40px; text-align:center;"> 個につき<br>
            <input type="number" id="edit_disc_val" style="width:60px; text-align:center;"> 円割引
        </div>
        <button onclick="saveSettings()" style="width:100%; padding:15px; margin-top:15px; background:var(--primary-color); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">保存して閉じる</button>
    </div>

    <div id="overlay" class="overlay"></div>

    <div class="history-section">
        <div class="history-header">
            <h3 style="margin:0; color:#555;">注文履歴</h3>
            <button class="clear-all-btn" onclick="clearAllHistory()">全削除</button>
        </div>
        <div class="history-container">
            <table id="historyTable">
                <thead id="historyHead"></thead>
                <tbody id="historyBody"></tbody>
                <tfoot id="historyFoot"></tfoot>
            </table>
        </div>
    </div>

    <script>
        // 初期値の設定
        let ice_list = ["バニラ", "いちご", "チョコ", "オレンジ", "マンゴー"];
        let ice_prc = [100, 100, 100, 100, 100];
        let prm = [2, 3, 5, 7, 11];
        let disc_unit = 3; 
        let disc_val = 50; 
        let rec = []; 
        let currentOrderNaiyou = null;

        // --- データの保存と読み込み機能 ---
        function loadData() {
            const savedRec = localStorage.getItem('prime_ice_rec');
            if (savedRec) rec = JSON.parse(savedRec);

            const savedConfig = localStorage.getItem('prime_ice_config');
            if (savedConfig) {
                const config = JSON.parse(savedConfig);
                ice_list = config.ice_list;
                ice_prc = config.ice_prc;
                disc_unit = config.disc_unit;
                disc_val = config.disc_val;
            }
        }

        function saveData() {
            localStorage.setItem('prime_ice_rec', JSON.stringify(rec));
            const config = {
                ice_list: ice_list,
                ice_prc: ice_prc,
                disc_unit: disc_unit,
                disc_val: disc_val
            };
            localStorage.setItem('prime_ice_config', JSON.stringify(config));
        }

        // ページ読み込み時に実行
        window.onload = function() {
            loadData();
            updateHistory();
        };

        // --- 以下、既存のロジック ---

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('settingsModal').style.display === 'block') return;
            if (e.key >= '0' && e.key <= '9') { press(e.key); visualFeedback(`btn-${e.key}`); }
            else if (e.key === 'Backspace') { press('BS'); visualFeedback('btn-BS'); }
            else if (e.key === 'Enter') {
                if (document.getElementById('confirmModal').style.display === 'block') confirmAction(true);
                else { submitOrder(); visualFeedback('btn-ENT'); }
            } else if (e.key === 'Escape') closeModals();
        });

        function visualFeedback(id) {
            const btn = document.getElementById(id);
            if (btn) { btn.classList.add('active'); setTimeout(() => btn.classList.remove('active'), 100); }
        }

        function press(key) {
            const disp = document.getElementById('display');
            if (key === 'BS') disp.value = disp.value.slice(0, -1);
            else disp.value += key;
        }

        function anl(n) {
            let num = parseInt(n);
            if (isNaN(num) || num <= 0) return [];
            let naiyou = [0, 0, 0, 0, 0, 0, 0, 0]; 
            let totalCount = 0;
            let totalPrice = 0;
            for (let i = 0; i < prm.length; i++) {
                while (num % prm[i] === 0) {
                    naiyou[i]++;
                    totalPrice += ice_prc[i];
                    totalCount++;
                    num = num / prm[i];
                }
            }
            if (num !== 1) return [];
            let discount = Math.floor(totalCount / disc_unit) * disc_val;
            naiyou[5] = totalPrice - discount;
            naiyou[6] = totalCount;
            naiyou[7] = discount;
            return naiyou;
        }

        function submitOrder() {
            const num = document.getElementById('display').value;
            if(!num) return;
            const result = anl(num);
            if (result.length === 0) {
                alert("解析エラー: 番号が正しくありません");
                document.getElementById('display').value = "";
                return;
            }
            currentOrderNaiyou = result;
            let html = `<table style="width:100%"><tr><th>項目</th><th>数量</th></tr>`;
            for(let i=0; i<ice_list.length; i++) {
                if(result[i] > 0) html += `<tr><td>${ice_list[i]}</td><td>${result[i]}</td></tr>`;
            }
            html += `<tr><td>合計個数</td><td>${result[6]} 個</td></tr>`;
            if(result[7] > 0) html += `<tr class="discount-text"><td>割引</td><td>-${result[7]} 円</td></tr>`;
            html += `<tr style="background:#f1f8e9"><td><strong>支払金額</strong></td><td><strong>${result[5]} 円</strong></td></tr></table>`;
            document.getElementById('orderResult').innerHTML = html;
            document.getElementById('confirmModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function confirmAction(isConfirmed) {
            if (isConfirmed && currentOrderNaiyou) {
                const now = new Date();
                const hhmmss = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');
                const recordEntry = [
                    currentOrderNaiyou[0], currentOrderNaiyou[1], currentOrderNaiyou[2], 
                    currentOrderNaiyou[3], currentOrderNaiyou[4], currentOrderNaiyou[5], 
                    currentOrderNaiyou[7], hhmmss
                ];
                rec.push(recordEntry);
                saveData(); // 保存
                updateHistory();
            }
            closeModals();
            document.getElementById('display').value = "";
        }

        function updateHistory() {
            const head = document.getElementById('historyHead');
            const body = document.getElementById('historyBody');
            const foot = document.getElementById('historyFoot');
            
            let headHtml = "<tr><th>時刻</th>";
            ice_list.forEach(name => headHtml += `<th>${name}</th>`);
            headHtml += "<th>割引</th><th>金額</th><th>操作</th></tr>";
            head.innerHTML = headHtml;

            let colTotals = new Array(ice_list.length + 2).fill(0);
            let bodyHtml = "";
            rec.forEach((row, index) => {
                bodyHtml += "<tr>";
                bodyHtml += `<td class="time-col">${row[7]}</td>`;
                for(let i=0; i<5; i++) {
                    bodyHtml += `<td>${row[i]}</td>`;
                    colTotals[i] += row[i];
                }
                bodyHtml += `<td class="discount-text">${row[6]}</td>`;
                colTotals[5] += row[6];
                bodyHtml += `<td>${row[5]}</td>`;
                colTotals[6] += row[5];
                bodyHtml += `<td><button class="del-btn" onclick="deleteHistory(${index})">×</button></td>`;
                bodyHtml += "</tr>";
            });
            body.innerHTML = bodyHtml || "<tr><td colspan='10'>注文待ち...</td></tr>";

            if(rec.length > 0) {
                let footHtml = `<tr class="total-row"><td>総計</td>`;
                colTotals.forEach(val => footHtml += `<td>${val}</td>`);
                footHtml += `<td></td></tr>`;
                foot.innerHTML = footHtml;
            } else {
                foot.innerHTML = "";
            }
        }

        function deleteHistory(index) {
            if(confirm("この注文を削除しますか？")) {
                rec.splice(index, 1);
                saveData(); // 保存
                updateHistory();
            }
        }

        function clearAllHistory() {
            if(rec.length === 0) return;
            if(confirm("【警告】すべての履歴を削除しますか？")) {
                rec = [];
                saveData(); // 保存
                updateHistory();
            }
        }

        function openSettings() {
            const body = document.getElementById('settingsBody');
            body.innerHTML = "";
            for(let i=0; i<5; i++) {
                body.innerHTML += `<tr>
                    <td><input type="text" id="edit_l_${i}" class="setting-input" value="${ice_list[i]}"></td>
                    <td><input type="number" id="edit_p_${i}" class="setting-input" value="${ice_prc[i]}"></td>
                </tr>`;
            }
            document.getElementById('edit_disc_unit').value = disc_unit;
            document.getElementById('edit_disc_val').value = disc_val;
            document.getElementById('settingsModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function saveSettings() {
            for(let i=0; i<5; i++) {
                ice_list[i] = document.getElementById(`edit_l_${i}`).value;
                ice_prc[i] = parseInt(document.getElementById(`edit_p_${i}`).value) || 0;
            }
            disc_unit = parseInt(document.getElementById('edit_disc_unit').value) || 1;
            disc_val = parseInt(document.getElementById('edit_disc_val').value) || 0;
            saveData(); // 設定も保存
            updateHistory();
            closeModals();
        }

        function closeModals() {
            document.querySelectorAll('.modal, .overlay').forEach(el => el.style.display = 'none');
            currentOrderNaiyou = null;
        }
    </script>
</body>
</html>
